<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UA House &mdash; CHW Program Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Source+Serif+4:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --background:#f8faf9;
    --surface:#ffffff;
    --sunken:#f2f4f3;
    --text:#191c1c;
    --text-secondary:#46474d;
    --border:#e0ddd5;
    --primary:#003434;
    --primary-hover:#004d4d;
    --done-bg:#e6f4ea;
    --done-text:#0d652d;
    --blocked-bg:#fff7e6;
    --blocked-text:#855100;
    --not-started-bg:#f1f3f4;
    --not-started-text:#5f6368;
    --error:#ba1a1a;
    --error-bg:#ffedea;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;min-height:100%}
  body{
    background:var(--background);color:var(--text);
    font-family:'Hanken Grotesk',system-ui,-apple-system,sans-serif;
    font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--done-bg);color:var(--primary)}
  h1,h2,h3,.serif{font-family:'Source Serif 4',Georgia,serif;font-weight:700}
  .mono{font-family:'Hanken Grotesk',system-ui,sans-serif}
  a{color:var(--primary)}
  button,input,select,textarea{font:inherit}
  button{cursor:pointer}
  button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible,summary:focus-visible{
    outline:3px solid rgba(0,77,77,.3);outline-offset:2px
  }

  .app-shell{min-height:100vh}
  .sidebar{
    position:fixed;inset:0 auto 0 0;width:248px;background:var(--primary);color:#fff;
    border-right:1px solid var(--border);padding:28px 18px;display:flex;flex-direction:column;z-index:20
  }
  .sidebar-brand{padding:0 12px 24px;border-bottom:1px solid rgba(255,255,255,.18)}
  .sidebar-brand strong{display:block;font-family:'Source Serif 4',Georgia,serif;font-size:20px;line-height:1.2}
  .sidebar-brand span{display:block;margin-top:6px;font-size:12px;color:rgba(255,255,255,.72);letter-spacing:.04em;text-transform:uppercase}
  nav.tabs{display:flex;flex-direction:column;gap:5px;margin:24px 0}
  nav.tabs button{
    appearance:none;border:0;background:transparent;color:rgba(255,255,255,.76);
    min-height:44px;padding:10px 14px;text-align:left;border-radius:4px;font-weight:600
  }
  nav.tabs button:hover{background:rgba(255,255,255,.08);color:#fff}
  nav.tabs button.active{background:#fff;color:var(--primary);border-radius:999px}
  .sidebar .add-task-btn{margin-top:auto;width:100%;background:#fff;color:var(--primary);border-color:#fff}
  #app{margin-left:248px;max-width:1280px;padding:34px 42px 80px}
  section.tabpanel{display:none}
  section.tabpanel.active{display:block}

  header.top{margin-bottom:22px}
  .title-row{display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap}
  .title-row h1{font-size:32px;line-height:1.15;margin:0;color:var(--primary);letter-spacing:-.015em}
  .header-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .program-badge{
    font-size:13px;font-weight:600;background:var(--sunken);color:var(--text-secondary);
    border:1px solid var(--border);padding:7px 11px;border-radius:4px;white-space:nowrap
  }
  .overall-progress{
    background:var(--surface);border:1px solid var(--border);border-radius:4px;
    padding:15px 18px;margin-bottom:28px
  }
  .overall-progress .op-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
  .overall-progress .op-label,.overall-progress .op-count{font-size:13px;color:var(--text-secondary);font-weight:600}
  .bar-track{height:7px;border-radius:2px;background:var(--sunken);overflow:hidden}
  .bar-fill{height:100%;background:var(--primary);border-radius:2px;transition:width .2s ease}

  .sync-banner{display:none;background:var(--blocked-bg);color:var(--blocked-text);border:1px solid var(--border);border-left:4px solid var(--blocked-text);border-radius:4px;padding:10px 14px;font-size:14px;margin-bottom:18px}

  .stat-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:20px}
  .stat-tile{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:17px 18px}
  .stat-tile .stat-num{font-family:'Source Serif 4',Georgia,serif;font-size:30px;font-weight:700;color:var(--text);line-height:1}
  .stat-tile .stat-label{font-size:12px;color:var(--text-secondary);margin-top:7px;text-transform:uppercase;letter-spacing:.04em;font-weight:600}
  .stat-tile.warn .stat-num{color:var(--error)}
  .stat-tile.good .stat-num{color:var(--done-text)}
  .milestone-card{
    display:grid;grid-template-columns:minmax(150px,.65fr) minmax(0,1.35fr);
    background:var(--primary);color:#fff;border:1px solid var(--primary);border-radius:4px;
    margin-bottom:26px
  }
  .milestone-label{padding:18px;border-right:1px solid rgba(255,255,255,.22);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
  .milestone-content{padding:18px 20px}
  .milestone-content h2{margin:0 0 4px;font-size:21px;color:#fff}
  .milestone-content p{margin:0;color:rgba(255,255,255,.76);font-size:14px}
  .my-tasks-bar,.filter-bar{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px;
    background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:12px
  }
  .my-tasks-bar label.toggle-label{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text-secondary);font-weight:600;cursor:pointer}
  .toggle-switch{position:relative;width:40px;height:24px;background:var(--not-started-bg);border:1px solid var(--border);border-radius:8px;cursor:pointer;flex-shrink:0}
  .toggle-switch.on{background:var(--primary);border-color:var(--primary)}
  .toggle-switch .knob{position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:4px;transition:left .15s}
  .toggle-switch.on .knob{left:19px}
  .my-tasks-bar input[type=text]{width:220px}

  .dash-section{margin-bottom:28px}
  .dash-section h2,.contacts-section-title{
    font-size:20px;margin:0 0 3px;color:var(--primary);display:flex;align-items:center;justify-content:space-between
  }
  .dash-section .dash-sub{font-size:13px;color:var(--text-secondary);margin:0 0 10px}
  .dash-week-group{margin-bottom:17px}
  .dash-week-group .dwg-title{
    font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--text-secondary);
    font-weight:700;margin:0;padding:9px 12px;background:var(--sunken);border:1px solid var(--border);border-bottom:0;border-radius:4px 4px 0 0
  }
  .dash-empty,.empty-state{font-size:14px;color:var(--text-secondary);padding:22px;background:var(--surface);border:1px solid var(--border);border-radius:4px;text-align:center}

  .gate-rail{display:grid;gap:16px}
  .gate{position:relative}
  .gate-num{
    position:absolute;left:18px;top:18px;width:30px;height:30px;border-radius:4px;
    background:var(--sunken);border:1px solid var(--border);color:var(--primary);
    display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;z-index:1
  }
  .gate.complete .gate-num{background:var(--done-bg);color:var(--done-text)}
  .gate-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:18px 18px 18px 62px;cursor:pointer}
  .gate.active .gate-card{border-left:4px solid var(--primary);padding-left:59px}
  .gate-card:hover{border-color:var(--primary)}
  .gate-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .gate-title{font-size:19px;font-family:'Source Serif 4',Georgia,serif;font-weight:700;color:var(--primary)}
  .gate-dates{font-size:13px;color:var(--text-secondary);white-space:nowrap}
  .gate-obj{font-size:14px;color:var(--text-secondary);margin:7px 0 13px;max-width:78ch}
  .gate-exit{display:grid;grid-template-columns:170px 1fr;background:var(--sunken);border:1px solid var(--border);border-radius:4px;margin-bottom:12px;color:var(--text-secondary)}
  .gate-exit b{padding:12px;color:var(--primary);border-right:1px solid var(--border);font-family:'Source Serif 4',Georgia,serif}
  .gate-exit span{padding:12px}
  .gate-driver{font-size:13px;color:var(--text-secondary);margin-bottom:10px;font-style:italic}
  .gate-progress-row{display:flex;align-items:center;gap:10px}
  .gate-progress-row .bar-track{flex:1}
  .gate-progress-row .gp-count{font-size:12px;color:var(--text-secondary);white-space:nowrap;font-weight:600}
  .schedule-note{font-size:13px;color:var(--text-secondary);margin-top:16px}

  .tasks-toolbar,.contacts-toolbar{display:flex;gap:8px;justify-content:flex-end;margin-bottom:14px}
  .add-task-btn,.btn-primary{
    background:var(--primary);color:#fff;border:1px solid var(--primary);border-radius:8px;
    min-height:42px;padding:9px 16px;font-size:14px;font-weight:700
  }
  .add-task-btn:hover,.btn-primary:hover{background:var(--primary-hover);border-color:var(--primary-hover)}
  .snapshot-btn,.btn-secondary,.clear-btn{
    background:var(--surface);border:1px solid var(--border);color:var(--primary);border-radius:8px;
    min-height:42px;padding:8px 14px;font-size:14px;font-weight:600
  }
  .snapshot-btn:hover,.btn-secondary:hover,.clear-btn:hover{border-color:var(--primary);color:var(--primary-hover)}
  .btn-danger{background:var(--surface);border:1px solid var(--error);color:var(--error);border-radius:8px;min-height:42px;padding:9px 16px;font-size:14px}
  .btn-danger:hover{background:var(--error-bg)}
  .btn-primary:disabled{opacity:.6;cursor:default}
  select,input[type=search],input[type=text],input[type=date],textarea{
    font-size:14px;min-height:42px;padding:8px 10px;border:1px solid var(--border);
    border-radius:4px;background:#fff;color:var(--text)
  }
  .filter-bar input[type=search]{flex:1;min-width:190px}
  .filter-bar select{cursor:pointer;min-width:145px}

  .phase-group{margin-bottom:26px}
  .phase-group h3{font-size:18px;margin:0;padding:12px 14px;background:var(--sunken);border:1px solid var(--border);border-radius:4px 4px 0 0;color:var(--primary);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .phase-group h3 .pg-count{font-size:12px;color:var(--text-secondary);font-weight:500;font-family:'Hanken Grotesk',sans-serif}
  .task-row{
    display:grid;grid-template-columns:24px 1fr;gap:11px;background:var(--surface);
    border:1px solid var(--border);border-top:0;border-radius:0;padding:14px;margin:0
  }
  .task-row:last-child{border-radius:0 0 4px 4px}
  .dash-section>div>.task-row:first-child{border-top:1px solid var(--border);border-radius:4px 4px 0 0}
  .dash-section>div>.task-row:last-child{border-radius:0 0 4px 4px}
  .task-row.is-done{background:var(--done-bg)}
  .task-row.overdue{border-left:4px solid var(--error)}
  .task-row input[type=checkbox]{width:18px;height:18px;margin-top:3px;accent-color:var(--primary);cursor:pointer}
  .task-main{min-width:0}
  .task-text{font-size:14px;color:var(--text);margin:0 0 7px}
  .task-row.is-done .task-text{text-decoration:line-through;color:var(--text-secondary)}
  .task-meta,.task-controls{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:7px}
  .badge{font-size:11px;font-weight:650;padding:3px 7px;border-radius:4px;white-space:nowrap}
  .badge.track-anthem{background:var(--blocked-bg);color:var(--blocked-text)}
  .badge.track-internal{background:var(--done-bg);color:var(--done-text)}
  .badge.track-both,.badge.date{background:var(--not-started-bg);color:var(--not-started-text)}
  .badge.category{background:#fff;border:1px solid var(--border);color:var(--text-secondary)}
  .task-row.overdue .badge.date{background:var(--error-bg);color:var(--error)}
  .badge.date.no-date{font-style:italic}
  select.status-select{font-size:12px;min-height:32px;padding:4px 7px;border-radius:4px;font-weight:650}
  select.status-select.st-not-started{background:var(--not-started-bg);color:var(--not-started-text)}
  select.status-select.st-in-progress{background:var(--sunken);color:var(--primary);border-color:var(--primary)}
  select.status-select.st-blocked{background:var(--blocked-bg);color:var(--blocked-text)}
  select.status-select.st-done{background:var(--done-bg);color:var(--done-text)}
  input.owner-input{font-size:12px;min-height:32px;padding:4px 8px;width:130px}
  .task-edit-btn{background:transparent;border:1px solid transparent;color:var(--primary);cursor:pointer;font-size:12px;padding:4px 7px;border-radius:4px;font-weight:650}
  .task-edit-btn:hover{background:var(--sunken);border-color:var(--border)}
  .task-notes{font-size:13px;color:var(--text-secondary);margin-top:6px;font-style:italic}
  .task-source{font-size:11px;color:var(--text-secondary)}

  .contact-group{margin-bottom:24px}
  .contact-group-header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:10px}
  .contact-group-header h3{margin:0;font-size:18px;color:var(--primary)}
  .count-badge{background:var(--sunken);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:12px;color:var(--text-secondary);font-weight:700}
  .contact-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
  .contact-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:15px 16px}
  .contact-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .contact-name{font-family:'Source Serif 4',Georgia,serif;font-size:17px;font-weight:700;color:var(--primary)}
  .contact-org,.contact-detail,.contact-notes,.doclink-meta{font-size:13px;color:var(--text-secondary);margin-top:5px}
  .contact-detail b{color:var(--text);font-weight:650}
  .contact-notes{font-style:italic}
  .contact-actions{display:flex;gap:4px}
  .doclink-row{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:12px 14px;margin-bottom:8px}
  .doclink-main a{font-size:14px;font-weight:700;color:var(--primary);text-decoration:none}
  .doclink-main a:hover{text-decoration:underline}

  .ref-section{margin-bottom:28px}
  .ref-section h2{font-size:21px;margin:0 0 10px;color:var(--primary)}
  .ref-item{background:var(--surface);border:1px solid var(--border);border-radius:4px;margin-bottom:8px;overflow:hidden}
  .ref-item summary{min-height:48px;padding:12px 14px;font-size:14px;font-weight:650;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;color:var(--text)}
  .ref-item summary::-webkit-details-marker{display:none}
  .ref-item summary::after{content:"+";color:var(--primary);font-size:19px}
  .ref-item[open] summary{background:var(--sunken);border-bottom:1px solid var(--border)}
  .ref-item[open] summary::after{content:"\2212"}
  .ref-item .ref-body{padding:14px;font-size:14px;color:var(--text-secondary);line-height:1.65}
  .ref-item .ref-source{display:block;margin-top:8px;font-size:12px;color:var(--text-secondary)}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(25,28,28,.58);align-items:center;justify-content:center;padding:20px;z-index:100}
  .modal-overlay.open{display:flex}
  .modal-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto;padding:21px 22px}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .modal-header h3{margin:0;font-size:21px;color:var(--primary)}
  .modal-close{background:none;border:0;font-size:24px;line-height:1;cursor:pointer;color:var(--text-secondary);padding:0;width:44px;height:44px}
  .modal-close:hover{color:var(--error)}
  #add-task-form,#contact-form,#doclink-form{display:flex;flex-direction:column;gap:12px}
  #add-task-form label,#contact-form label,#doclink-form label{display:flex;flex-direction:column;gap:5px;font-size:13px;color:var(--text-secondary);font-weight:650}
  #add-task-form .req,#contact-form .req,#doclink-form .req{color:var(--error)}
  #add-task-form textarea,#contact-form textarea,#doclink-form textarea{min-height:68px;resize:vertical}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:5px}
  #snapshot-modal{max-width:680px}
  #snapshot-body{font-size:14px;line-height:1.65;color:var(--text);white-space:pre-wrap;background:var(--sunken);border:1px solid var(--border);border-radius:4px;padding:14px;max-height:50vh;overflow-y:auto}
  #print-area{display:none}

  footer.appfoot{margin-top:38px;padding-top:17px;border-top:1px solid var(--border);font-size:12px;color:var(--text-secondary);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
  footer.appfoot button{font-size:12px;color:var(--error);background:none;border:0;cursor:pointer;text-decoration:underline}

  @media (max-width:900px){
    .sidebar{position:sticky;top:0;width:100%;height:auto;padding:10px 14px;display:block;border-right:0;border-bottom:1px solid var(--border)}
    .sidebar-brand{display:none}
    nav.tabs{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin:0}
    nav.tabs button{min-height:44px;padding:8px 4px;text-align:center;font-size:12px;color:rgba(255,255,255,.78)}
    .sidebar .add-task-btn{display:none}
    #app{margin-left:0;padding:26px 20px 70px}
  }
  @media (max-width:640px){
    body{font-size:16px}
    #app{padding:22px 14px 60px}
    .title-row{align-items:flex-start}
    .title-row h1{font-size:27px}
    .header-actions{width:100%}
    .stat-row{grid-template-columns:repeat(2,1fr)}
    .milestone-card{grid-template-columns:1fr}
    .milestone-label{border-right:0;border-bottom:1px solid rgba(255,255,255,.22)}
    .gate-exit{grid-template-columns:1fr}
    .gate-exit b{border-right:0;border-bottom:1px solid var(--border)}
    .contact-grid{grid-template-columns:1fr}
    .form-row{grid-template-columns:1fr}
    .filter-bar>*{width:100%;min-width:0!important}
    .task-row{padding:12px 10px}
    .program-badge{order:2}
  }
  @media print{
    body *{visibility:hidden}
    #print-area,#print-area *{visibility:visible}
    #print-area{display:block;position:absolute;top:0;left:0;width:100%;padding:20px;white-space:pre-wrap;font-family:'Hanken Grotesk',sans-serif;font-size:12px}
  }
  @media (prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition:none!important}}
</style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <strong>CHW Program Planner</strong>
      <span>UA House · CalAIM</span>
    </div>
    <nav class="tabs" aria-label="Planner sections">
      <button data-tab="dashboard" class="active">Dashboard</button>
      <button data-tab="timeline">Timeline</button>
      <button data-tab="tasks">Tasks</button>
      <button data-tab="contacts">Contacts</button>
      <button data-tab="reference">Reference</button>
    </nav>
    <button class="add-task-btn" id="open-add-task">+ Add Task</button>
  </aside>
<main id="app">

  <header class="top">
    <div class="title-row">
      <div>
        <h1>UA House CHW Program Planner</h1>
      </div>
      <div class="header-actions">
        <span class="program-badge">Jul 2026 &ndash; ongoing</span>
        <button class="snapshot-btn" id="open-snapshot">Export Snapshot</button>
      </div>
    </div>
  </header>
  <div class="overall-progress">
      <div class="op-row">
        <span class="op-label">Overall program progress</span>
        <span class="op-count mono" id="overall-count">0 / 0 tasks</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="overall-bar" style="width:0%"></div></div>
  </div>

  <section id="tab-dashboard" class="tabpanel active">
    <div id="dashboard-content"></div>
  </section>

  <section id="tab-timeline" class="tabpanel">
    <div class="gate-rail" id="gate-rail"></div>
    <p class="schedule-note" id="schedule-note"></p>
  </section>

  <section id="tab-tasks" class="tabpanel">
    <div class="tasks-toolbar">
      <button class="add-task-btn" id="open-add-task-tasks">+ Add Task</button>
    </div>
    <div class="filter-bar">
      <input type="search" id="search-input" placeholder="Search tasks...">
      <select id="filter-phase"><option value="">All phases</option></select>
      <select id="filter-track"><option value="">All tracks</option></select>
      <select id="filter-status"><option value="">All statuses</option></select>
      <select id="filter-owner"><option value="">All owners</option></select>
      <button class="clear-btn" id="clear-filters">Clear filters</button>
    </div>
    <div id="task-list"></div>
  </section>

  <div class="modal-overlay" id="add-task-overlay">
    <div class="modal-card">
      <div class="modal-header">
        <h3 id="task-modal-title">Add a task</h3>
        <button class="modal-close" id="close-add-task" aria-label="Close">&times;</button>
      </div>

const STATUSES = ['Not Started','In Progress','Blocked','Done'];

// TASKS is the live, shared array -- every browser pointed at this app reads and
// writes the same rows in Supabase, so everyone sees the same board.
let TASKS = SEED_TASKS.map(t=>({...t}));
let dbReady = false;

function dbRowToTask(row){
  return {
    id: row.id,
    Phase: row.phase,
    Track: row.track,
    Pacing: row.pacing,
    Category: row.category,
    Task: row.task,
    Owner: row.owner || '',
    "Target Date": row.target_date,
    Status: row.status,
    Source: row.source,
    Notes: row.notes,
  };
}

async function loadTasksFromDB(){
  const { data, error } = await sb.from('tasks').select('*').order('sort_order', {ascending:true});
  if(error){
    console.error('Failed to load tasks from Supabase, showing local seed data instead.', error);
    showSyncBanner('offline');
    return;
  }
  if(data && data.length){
    TASKS = data.map(dbRowToTask);
    dbReady = true;
    hideSyncBanner();
    renderAll();
  }
}

async function persistTask(id, fields){
  // fields uses DB column names, e.g. {status:'Done', owner:'Alex'}
  const { error } = await sb.from('tasks').update(fields).eq('id', id);
  if(error){
    console.error('Failed to save change to Supabase', error);
    showSyncBanner('save-failed');
  } else {
    hideSyncBanner();
  }
}

function showSyncBanner(kind){
  let el = document.getElementById('sync-banner');
  if(!el){
    el = document.createElement('div');
    el.id = 'sync-banner';
    el.className = 'sync-banner';
    document.getElementById('app').prepend(el);
  }
  el.textContent = kind==='offline'
    ? "Couldn't reach the shared database -- showing the original spreadsheet data. Changes won't be saved until this reconnects."
    : "Couldn't save your last change -- check your connection and try again.";
  el.style.display = 'block';
}
function hideSyncBanner(){
  const el = document.getElementById('sync-banner');
  if(el) el.style.display = 'none';
}

function getTaskState(id){
  const t = TASKS.find(x=>x.id===id);
  return {status: (t && t.Status) || 'Not Started', owner: (t && t.Owner) || ''};
}

function setTaskState(id, fields){
  const t = TASKS.find(x=>x.id===id);
  if(!t) return;
  const dbFields = {};
  if('status' in fields){ t.Status = fields.status; dbFields.status = fields.status; }
  if('owner' in fields){ t.Owner = fields.owner; dbFields.owner = fields.owner; }
  persistTask(id, dbFields);
}

function statusClass(status){
  return 'st-' + status.toLowerCase().replace(/\s+/g,'-');
}
function trackClass(track){
  const t = (track||'').toLowerCase();
  if(t==='anthem') return 'track-anthem';
  if(t==='internal') return 'track-internal';
  return 'track-both';
}

function fmtDate(d){
  if(!d || d==='Continuous') return d || '';
  return d;
}
function parseISO(s){
  if(typeof s === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(s)){
    return new Date(s+'T00:00:00');
  }
  return null;
}
function prettyDate(s){
  const d = parseISO(s);
  if(!d) return s || '';
  return d.toLocaleDateString('en-US',{weekday:'short', month:'short', day:'numeric'});
}
function getMonday(date){
  const d = new Date(date);
  const day = d.getDay();
  const diff = (day===0? -6 : 1) - day;
  d.setDate(d.getDate()+diff);
  d.setHours(0,0,0,0);
  return d;
}
function addDays(date, n){
  const d = new Date(date);
  d.setDate(d.getDate()+n);
  return d;
}
function isSameOrBefore(a,b){ return a.getTime() <= b.getTime(); }

// ---------- Overall progress ----------
function renderOverallProgress(){
  const total = TASKS.length;
  const done = TASKS.filter(t=>getTaskState(t.id).status==='Done').length;
  document.getElementById('overall-count').textContent = done + ' / ' + total + ' tasks';
  document.getElementById('overall-bar').style.width = (total? (done/total*100):0) + '%';
}

// ---------- Timeline ----------
function phaseTasks(phaseName){
  return TASKS.filter(t=>t.Phase===phaseName);
}
function renderGateRail(){
  const rail = document.getElementById('gate-rail');
  rail.innerHTML = '';
  const activePhase = PHASE_DATA.phases.find(p=>{
    const pts = phaseTasks(p.Phase);
    return pts.length && !pts.every(t=>getTaskState(t.id).status==='Done');
  });
  PHASE_DATA.phases.forEach((p, idx)=>{
    const pts = phaseTasks(p.Phase);
    const done = pts.filter(t=>getTaskState(t.id).status==='Done').length;
    const total = pts.length;
    const pct = total? Math.round(done/total*100) : 0;
    const complete = total>0 && done===total;

    const gate = document.createElement('div');
    gate.className = 'gate' + (complete? ' complete':'') + (activePhase && activePhase.Phase===p.Phase ? ' active':'');
    gate.innerHTML = `
      <div class="gate-num">${idx+1}</div>
      <div class="gate-card" data-phase="${p.Phase.replace(/"/g,'&quot;')}">
        <div class="gate-top">
          <span class="gate-title">${p.Phase}</span>
          <span class="gate-dates mono">${fmtDate(p.Start)} &rarr; ${fmtDate(p['Target Completion'])}</span>
        </div>
        <p class="gate-obj">${p.Objective||''}</p>
        <div class="gate-exit"><b>Exit Gate Criteria</b><span>${p["Exit Gate (what proves you're done)"]||''}</span></div>
        <div class="gate-driver">${p['Primary Duration Driver']||''}</div>
        <div class="gate-progress-row">
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
          <span class="gp-count">${done}/${total} tasks</span>
        </div>
      </div>
    `;
    gate.querySelector('.gate-card').addEventListener('click', ()=>goToTasksFiltered(p.Phase));
    rail.appendChild(gate);
  });
  document.getElementById('schedule-note').textContent = PHASE_DATA.note || '';
}

function buildTaskRowHTML(t){
  const ts = getTaskState(t.id);
  const rawDate = t['Target Date'];
  const parsedDate = parseISO(rawDate);
  const today = new Date(); today.setHours(0,0,0,0);
  const isOverdue = parsedDate && parsedDate.getTime() < today.getTime() && ts.status!=='Done';
  const dateBadgeClass = parsedDate ? 'date' : 'no-date date';
  const dateLabel = parsedDate ? prettyDate(rawDate) : (rawDate || 'No fixed date');

  return `
    <div class="task-row ${ts.status==='Done' ? 'is-done':''} ${isOverdue?'overdue':''}" data-row-id="${t.id}">
      <input type="checkbox" ${ts.status==='Done'?'checked':''} data-id="${t.id}" class="done-check">
      <div class="task-main">
        <p class="task-text">${t.Task}</p>
        <div class="task-meta">
          <span class="badge ${trackClass(t.Track)}">${t.Track||''}</span>
          <span class="badge category">${t.Category||''}</span>
          <span class="badge ${dateBadgeClass}">${isOverdue? 'Overdue &middot; ':''}${dateLabel}</span>
        </div>
        <div class="task-controls">
          <select class="status-select ${statusClass(ts.status)}" data-id="${t.id}">
            ${STATUSES.map(s=>`<option value="${s}" ${s===ts.status?'selected':''}>${s}</option>`).join('')}
          </select>
          <input type="text" class="owner-input" placeholder="Owner" value="${(ts.owner||'').replace(/"/g,'&quot;')}" data-id="${t.id}">
          <span class="task-source">${t.Source||''}</span>
          <button type="button" class="task-edit-btn" data-id="${t.id}">Edit</button>
        </div>
        ${t.Notes? `<div class="task-notes">${t.Notes}</div>` : ''}
      </div>
    </div>
  `;
}

function wireTaskRowEvents(container){
  container.querySelectorAll('.done-check').forEach(cb=>{
    cb.addEventListener('change', e=>{
      const id = parseInt(e.target.dataset.id);
      setTaskState(id, {status: e.target.checked ? 'Done' : 'Not Started'});
      renderAll();
    });
  });
  container.querySelectorAll('.status-select').forEach(sel=>{
    sel.addEventListener('change', e=>{
      const id = parseInt(e.target.dataset.id);
      setTaskState(id, {status: e.target.value});
      renderAll();
    });
  });
  container.querySelectorAll('.owner-input').forEach(inp=>{
    let debounceTimer;
    inp.addEventListener('input', e=>{
      const id = parseInt(e.target.dataset.id);
      const val = e.target.value;
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(()=>setTaskState(id, {owner: val}), 400);
    });
    inp.addEventListener('click', e=>e.stopPropagation());
  });
  container.querySelectorAll('.task-edit-btn').forEach(btn=>{
    btn.addEventListener('click', e=>{
      const id = parseInt(e.target.dataset.id);
      openEditTaskModal(id);
    });
  });
}

function getMyTasksPref(){
  return {
    name: localStorage.getItem('plannerMyName') || '',
    only: localStorage.getItem('plannerMyTasksOnly') === '1',
  };
}
function setMyTasksPref(name, only){
  localStorage.setItem('plannerMyName', name);
  localStorage.setItem('plannerMyTasksOnly', only ? '1' : '0');
}

function renderDashboard(){
  const el = document.getElementById('dashboard-content');
  const today = new Date(); today.setHours(0,0,0,0);
  const monday = getMonday(today);
  const sunday = addDays(monday,6);

  const pref = getMyTasksPref();
  let baseTasks = TASKS;
  if(pref.only && pref.name.trim()){
    const nameLower = pref.name.trim().toLowerCase();
    baseTasks = TASKS.filter(t=>(t.Owner||'').trim().toLowerCase() === nameLower);
  }

  const notDone = baseTasks.filter(t=>getTaskState(t.id).status!=='Done');

  const withParsedDate = notDone.map(t=>({t, d: parseISO(t['Target Date'])}));

  const overdue = withParsedDate.filter(x=>x.d && x.d.getTime() < monday.getTime()).map(x=>x.t);
  const thisWeek = withParsedDate.filter(x=>x.d && x.d.getTime()>=monday.getTime() && x.d.getTime()<=sunday.getTime()).map(x=>x.t);
  const noFixedDate = withParsedDate.filter(x=>!x.d).map(x=>x.t);

  const comingUpWeeks = [];
  for(let w=1; w<=3; w++){
    const wStart = addDays(monday, w*7);
    const wEnd = addDays(wStart, 6);
    const items = withParsedDate.filter(x=>x.d && x.d.getTime()>=wStart.getTime() && x.d.getTime()<=wEnd.getTime()).map(x=>x.t);
    comingUpWeeks.push({start:wStart, end:wEnd, items});
  }
  const laterDate = addDays(monday, 28);
  const later = withParsedDate.filter(x=>x.d && x.d.getTime()>=laterDate.getTime()).map(x=>x.t);

  const total = baseTasks.length;
  const done = baseTasks.filter(t=>getTaskState(t.id).status==='Done').length;
  const inProgress = baseTasks.filter(t=>getTaskState(t.id).status==='In Progress').length;
  const nextMilestone = PHASE_DATA.phases.find(p=>{
    const pts = phaseTasks(p.Phase);
    return pts.length && !pts.every(t=>getTaskState(t.id).status==='Done');
  });

  const wf = (d)=>d.toLocaleDateString('en-US',{month:'short', day:'numeric'});

  let html = `
    <div class="my-tasks-bar">
      <label class="toggle-label">
        <span class="toggle-switch ${pref.only?'on':''}" id="my-tasks-toggle"><span class="knob"></span></span>
        My tasks only
      </label>
      <input type="text" id="my-name-input" placeholder="Your name (must match Owner field)" value="${pref.name.replace(/"/g,'&quot;')}">
    </div>
    <div class="stat-row">
      <div class="stat-tile good"><div class="stat-num">${done}</div><div class="stat-label">Done</div></div>
      <div class="stat-tile"><div class="stat-num">${inProgress}</div><div class="stat-label">In progress</div></div>
      <div class="stat-tile warn"><div class="stat-num">${overdue.length}</div><div class="stat-label">Overdue</div></div>
      <div class="stat-tile"><div class="stat-num">${total-done}</div><div class="stat-label">Remaining</div></div>
    </div>
    ${nextMilestone ? `<div class="milestone-card">
      <div class="milestone-label">Next Milestone</div>
      <div class="milestone-content"><h2>${nextMilestone.Phase}</h2><p>Target completion: ${fmtDate(nextMilestone['Target Completion'])}</p></div>
    </div>` : ''}
  `;

  if(pref.only && pref.name.trim() && total===0){
    html += `<div class="dash-empty">No tasks found with Owner set to "${pref.name.trim().replace(/"/g,'&quot;')}". Owner is case-insensitive but must match exactly otherwise.</div>`;
  }

  if(overdue.length){
    html += `<div class="dash-section"><h2>Overdue</h2><p class="dash-sub">Past their target date and not marked done.</p><div id="dash-overdue"></div></div>`;
  }

  html += `<div class="dash-section"><h2>This Week</h2><p class="dash-sub">${wf(monday)} &ndash; ${wf(sunday)}</p><div id="dash-thisweek"></div></div>`;

  html += `<div class="dash-section"><h2>Coming Up</h2><div id="dash-comingup"></div></div>`;

  if(noFixedDate.length){
    html += `<div class="dash-section"><h2>No Fixed Date</h2><p class="dash-sub">Blocked on an external party, or ongoing rather than one-time.</p><div id="dash-nodate"></div></div>`;
  }

  el.innerHTML = html;

  document.getElementById('my-tasks-toggle').addEventListener('click', ()=>{
    const nameVal = document.getElementById('my-name-input').value;
    setMyTasksPref(nameVal, !pref.only);
    renderDashboard();

function renderTasks(){
  const ownerSelect = document.getElementById('filter-owner');
  const selectedOwner = ownerSelect.value;
  const owners = [...new Set(TASKS.map(t=>(t.Owner||'').trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
  ownerSelect.innerHTML = '<option value="">All owners</option>' + owners.map(owner=>`<option value="${owner.replace(/"/g,'&quot;')}">${owner}</option>`).join('');
  if(owners.includes(selectedOwner)) ownerSelect.value = selectedOwner;
  const search = document.getElementById('search-input').value.trim().toLowerCase();
  const phaseFilter = document.getElementById('filter-phase').value;
  const trackFilter = document.getElementById('filter-track').value;
  const statusFilter = document.getElementById('filter-status').value;
  const ownerFilter = document.getElementById('filter-owner').value;

  let filtered = TASKS.filter(t=>{
    const ts = getTaskState(t.id);
    if(phaseFilter && t.Phase!==phaseFilter) return false;
    if(trackFilter && t.Track!==trackFilter) return false;
    if(statusFilter && ts.status!==statusFilter) return false;
    if(ownerFilter && ts.owner!==ownerFilter) return false;
    if(search){
      const hay = (t.Task+' '+t.Category+' '+(ts.owner||'')+' '+(t.Notes||'')).toLowerCase();
      if(!hay.includes(search)) return false;
    }
    return true;
  });

  const listEl = document.getElementById('task-list');
  listEl.innerHTML = '';

  if(filtered.length===0){
    listEl.innerHTML = '<div class="empty-state">No tasks match these filters.</div>';
    return;
  }

  const phaseOrder = PHASE_DATA.phases.map(p=>p.Phase).concat(['Ongoing / Cross-Phase']);
  const grouped = {};
  filtered.forEach(t=>{
    (grouped[t.Phase] = grouped[t.Phase]||[]).push(t);
  });

  phaseOrder.filter(p=>grouped[p]).forEach(phaseName=>{
    const group = document.createElement('div');
    group.className = 'phase-group';
    const allInPhase = phaseTasks(phaseName);
    const doneInPhase = allInPhase.filter(t=>getTaskState(t.id).status==='Done').length;
    group.innerHTML = `<h3>${phaseName} <span class="pg-count">${doneInPhase}/${allInPhase.length} done overall &middot; ${grouped[phaseName].length} shown</span></h3>` +
      grouped[phaseName].map(buildTaskRowHTML).join('');
    listEl.appendChild(group);
  });

  wireTaskRowEvents(listEl);
}

// ---------- Snapshot export ----------
function buildSnapshotText(){
  const today = new Date();
  const dateStr = today.toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  const total = TASKS.length;
  const done = TASKS.filter(t=>getTaskState(t.id).status==='Done').length;
  const blocked = TASKS.filter(t=>getTaskState(t.id).status==='Blocked').length;
  const pct = total ? Math.round(done/total*100) : 0;

  let out = `UA HOUSE CHW PROGRAM -- STATUS SNAPSHOT\n${dateStr}\n\n`;
  out += `Overall progress: ${done}/${total} tasks complete (${pct}%)\n`;
  out += `Blocked tasks: ${blocked}\n\n`;
  out += `PHASE STATUS\n`;
  PHASE_DATA.phases.forEach((p, idx)=>{
    const pts = phaseTasks(p.Phase);
    const pdone = pts.filter(t=>getTaskState(t.id).status==='Done').length;
    const ptotal = pts.length;
    out += `${idx+1}. ${p.Phase} -- ${pdone}/${ptotal} tasks (${fmtDate(p.Start)} to ${fmtDate(p['Target Completion'])})\n`;
  });

  const today0 = new Date(); today0.setHours(0,0,0,0);
  const monday = getMonday(today0);
  const sunday = addDays(monday, 6);
  const notDone = TASKS.filter(t=>getTaskState(t.id).status!=='Done');
  const withDate = notDone.map(t=>({t, d: parseISO(t['Target Date'])}));
  const overdue = withDate.filter(x=>x.d && x.d.getTime() < monday.getTime()).map(x=>x.t);
  const thisWeek = withDate.filter(x=>x.d && x.d.getTime()>=monday.getTime() && x.d.getTime()<=sunday.getTime()).map(x=>x.t);

  if(overdue.length){
    out += `\nOVERDUE (${overdue.length})\n`;
    overdue.forEach(t=>{ out += `- ${t.Task} (${fmtDate(t['Target Date'])}${t.Owner? ', '+t.Owner:''})\n`; });
  }
  out += `\nTHIS WEEK (${thisWeek.length})\n`;
  if(thisWeek.length){
    thisWeek.forEach(t=>{ out += `- ${t.Task}${t.Owner? ' -- '+t.Owner:''}\n`; });
  } else {
    out += `- Nothing due this week.\n`;
  }
  return out;
}

  const editingId = document.getElementById('editing-task-id').value;

  const submitBtn = document.getElementById('submit-add-task');
  submitBtn.disabled = true;

  if(editingId){
    submitBtn.textContent = 'Saving...';
    const { error } = await sb.from('tasks').update({
      phase: phase, track: track, pacing: pacing, category: category || 'General',
      task: taskText, owner: owner, target_date: dateVal || 'No fixed date',
      status: status, notes: notes,
    }).eq('id', parseInt(editingId));

    submitBtn.disabled = false;
    submitBtn.textContent = 'Save changes';

    if(error){
      console.error('Failed to save task', error);
      showSyncBanner('save-failed');
      return;
    }
    closeAddTaskModal();
    await loadTasksFromDB();
    return;
  }

  submitBtn.textContent = 'Adding...';
  const maxSort = TASKS.reduce((m,t)=> Math.max(m, (t.sort_order ?? 0)), TASKS.length ? TASKS.length : 0);

  const { error } = await sb.from('tasks').insert({
    phase: phase,
    track: track,
    pacing: pacing,
    category: category || 'General',
    task: taskText,
    owner: owner,
    target_date: dateVal || 'No fixed date',
    status: status,
    source: 'User-added',
    notes: notes,
    sort_order: maxSort + 1,
  });

  submitBtn.disabled = false;
  submitBtn.textContent = 'Add task';

  if(error){
    console.error('Failed to add task', error);
    showSyncBanner('save-failed');
    return;
  }

  closeAddTaskModal();
  await loadTasksFromDB();
  // jump to the phase the new task was added under, filtered, so it's immediately visible
  document.getElementById('filter-phase').value = phase;
  document.querySelector('[data-tab="tasks"]').click();
  renderTasks();
});

populateFilterOptions();
renderAll();
loadTasksFromDB();
loadContactsFromDB();
loadDocLinksFromDB();
</script>
</body>
</html>
